<script>
// ========== СРАВНЕНИЕ ==========
function compare() {
  var income = parseFloat(document.getElementById('cmp-inc').value) || 0;
  var expenses = parseFloat(document.getElementById('cmp-exp').value) || 0;

  var regimes = [
    {name: 'НПД', rate: 0.04, costs: 0, limit: 2400000, expenseBased: false},
    {name: 'ИП УСН 6%', rate: 0.06, costs: 45000, limit: 20000000, expenseBased: false},
    {name: 'ИП УСН 15%', rate: 0.15, costs: 45000, limit: 20000000, expenseBased: true},
    {name: 'ИП ПСН', rate: 0.06, costs: 30000, limit: 60000000, expenseBased: false},
    {name: 'ООО УСН 6%', rate: 0.06, costs: 60000, limit: 250000000, expenseBased: false},
    {name: 'ООО УСН 15%', rate: 0.15, costs: 60000, limit: 250000000, expenseBased: true}
  ];

  var results = regimes.map(function(regime) {
    var tax = regime.expenseBased ? Math.max((income - expenses) * regime.rate, income * 0.01) : income * regime.rate;
    return {
      name: regime.name,
      tax: tax,
      total: tax + regime.costs,
      ok: income <= regime.limit
    };
  });

  var best = results.filter(function(r) { return r.ok; }).reduce(function(a, b) {
    return (income - a.total) > (income - b.total) ? a : b;
  }, results[0]);

  var html = '<table class="compare-table"><thead><tr><th>Режим</th><th>Налог</th><th>Расходы</th><th>Итого</th><th>Чистый доход</th></tr></thead><tbody>';

  results.forEach(function(result) {
    var style = (result.name === best.name) ? ' style="background:rgba(212,237,218,0.7);font-weight:700"' : '';
    html += '<tr' + style + '><td>' + result.name + '</td><td>' + Math.round(result.tax).toLocaleString() + ' руб.</td><td>' + Math.round(result.total - result.tax).toLocaleString() + ' руб.</td><td>' + Math.round(result.total).toLocaleString() + ' руб.</td><td><b>' + Math.round(income - result.total).toLocaleString() + ' руб.</b></td></tr>';
  });

  html += '</tbody></table>';
  html += '<p style="color:var(--p);font-size:15px;margin-top:12px;font-weight:600">🏆 Оптимальный выбор: <b>' + best.name + '</b> — чистый доход <b>' + Math.round(income - best.total).toLocaleString() + ' руб.</b></p>';

  document.getElementById('cmp-res').innerHTML = html;
  document.getElementById('save-cmp-btn').style.display = 'block';

  challengeComplete('t4');
}

function saveCmpPDF() {
  var pdf = new jspdf.jsPDF();
  pdf.setFontSize(16);
  pdf.text('Сравнение налоговых режимов', 20, 20);
  pdf.setFontSize(10);
  pdf.text(document.getElementById('cmp-res').textContent, 20, 35, {maxWidth: 170});
  pdf.save('sravnenie_rezhimov.pdf');
}

function compareSalary() {
  var amount = parseFloat(document.getElementById('sal-amount').value) || 0;

  var html = '<table class="compare-table"><thead><tr><th>Форма работы</th><th>Налоги и взносы</th><th>Сумма на руки</th><th>Эффективная ставка</th></tr></thead><tbody>';

  html += '<tr><td>Самозанятый (НПД 6%)</td><td>' + Math.round(amount * 0.06).toLocaleString() + ' руб.</td><td><b>' + Math.round(amount * 0.94).toLocaleString() + ' руб.</b></td><td>6%</td></tr>';

  html += '<tr><td>ИП УСН 6%</td><td>' + Math.round(amount * 0.06 + 3750).toLocaleString() + ' руб.</td><td><b>' + Math.round(amount - amount * 0.06 - 3750).toLocaleString() + ' руб.</b></td><td>~7.3%</td></tr>';

  html += '<tr><td>Наёмный сотрудник</td><td>' + Math.round(amount * 0.43).toLocaleString() + ' руб.</td><td><b>' + Math.round(amount * 0.57).toLocaleString() + ' руб.</b></td><td>~43%</td></tr>';

  html += '</tbody></table>';
  html += '<p style="font-size:12px;color:var(--text-secondary);margin-top:10px">Для сотрудника учтены: НДФЛ 13%, страховые взносы 30% (платит работодатель сверх оклада). Для ИП: налог 6% + фиксированные страховые взносы ~45 000 руб./год (в пересчёте на месяц ~3 750 руб.).</p>';

  document.getElementById('sal-res').innerHTML = html;
}

function buildFAQ() {
  var html = '';

  faqList.forEach(function(item) {
    html += '<div class="faq-item"><button class="acc-btn" onclick="toggleFAQ(this)">' + item.q + '</button><div class="acc-body">' + item.a + '</div></div>';

function buildGlossary() {
  var html = '';

  glossaryTerms.forEach(function(term) {

  });

  document.getElementById('glossary').innerHTML = html;

// ========== КАЛЕНДАРЬ ==========
function changeMonth(delta) {
  currentMonth += delta;

  if (currentMonth > 11) {
    currentMonth = 0;
    currentYear++;
  }
  if (currentMonth < 0) {
    currentMonth = 11;
    currentYear--;
  }

  buildCalendar();
}

function buildCalendar() {
  var filter = document.getElementById('calendar-filter').value;
  var monthNames = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];

  document.getElementById('calendar-month').textContent = monthNames[currentMonth] + ' ' + currentYear;

  var firstDay = new Date(currentYear, currentMonth, 1).getDay();
  var daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

  firstDay = firstDay === 0 ? 6 : firstDay - 1;

  var grid = document.getElementById('calendar-grid');
  var daysOfWeek = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
  var html = '';

  daysOfWeek.forEach(function(day) {
    html += '<div class="calendar-header">' + day + '</div>';
  });

  for (var i = 0; i < firstDay; i++) {
    html += '<div></div>';
  }

  var today = new Date();
  var todayStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');

  for (var day = 1; day <= daysInMonth; day++) {
    var dateStr = currentYear + '-' + String(currentMonth + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');
    var isToday = (dateStr === todayStr) ? ' today' : '';

    var dayEvents = calendarEvents.filter(function(event) {
      return event.date === dateStr && (filter === 'all' || event.regimes.indexOf(filter) !== -1);
    });

    var hasNote = userNotes[dateStr] ? ' has-note' : '';
    var hasEvent = dayEvents.length > 0 ? ' has-event' : '';

    html += '<div class="calendar-day' + isToday + hasEvent + hasNote + '" onclick="showDayInfo(\'' + dateStr + '\')"><b>' + day + '</b>';

    if (dayEvents.length > 0) {
      html += '<div class="event-detail">' + dayEvents[0].desc.substring(0, 18) + (dayEvents.length > 1 ? '...' : '') + '</div>';
    }

    if (userNotes[dateStr]) {
      html += '<div class="event-detail" style="color:#ffc107">заметка</div>';
    }

    html += '</div>';
  }

  grid.innerHTML = html;
  renderNotes();
}

function showDayInfo(dateStr) {
  var filter = document.getElementById('calendar-filter').value;

  var dayEvents = calendarEvents.filter(function(event) {
    return event.date === dateStr && (filter === 'all' || event.regimes.indexOf(filter) !== -1);
  });

  var info = new Date(dateStr).toLocaleDateString('ru', {day: 'numeric', month: 'long', year: 'numeric'}) + '\n\n';

  if (dayEvents.length > 0) {
    info += 'События:\n';
    var regimeNames = {npd: 'НПД', ip: 'ИП', ooo: 'ООО'};
    dayEvents.forEach(function(event) {
      info += '• ' + event.desc + ' (' + event.regimes.map(function(r) { return regimeNames[r] || r; }).join(', ') + ')\n';
    });
  } else {
    info += 'Нет запланированных событий.\n';
  }

  if (userNotes[dateStr]) {
    info += '\nВаша заметка:\n' + userNotes[dateStr].text;
    if (userNotes[dateStr].time) {
      info += ' (напомнить в ' + userNotes[dateStr].time + ')';
    }
  }

  alert(info);
  document.getElementById('note-date').value = dateStr;
}

function addNote() {
  var date = document.getElementById('note-date').value;
  var text = document.getElementById('note-text').value.trim();
  var time = document.getElementById('note-time').value;

  if (!date || !text) {
    showToast('Выберите дату и введите текст заметки');
    return;
  }

  userNotes[date] = {
    text: text,
    time: time || null
  };

  localStorage.setItem('userNotes', JSON.stringify(userNotes));
  document.getElementById('note-text').value = '';

  if (time) {
    scheduleNoteReminder(date, time, text);
    showToast('Заметка сохранена! Напоминание установлено на ' + time);
  } else {
    showToast('Заметка сохранена!');
  }

  buildCalendar();

  challengeComplete('t5');
}

function clearNotes() {
  if (confirm('Удалить все персональные заметки?')) {
    userNotes = {};

    Object.keys(noteTimers).forEach(function(key) {
      clearTimeout(noteTimers[key]);
    });

    noteTimers = {};

    localStorage.removeItem('userNotes');
    buildCalendar();
    showToast('Все заметки удалены');
  }
}

function renderNotes() {
  var html = '<b>Ваши заметки:</b><br>';
  var hasNotes = false;

  Object.keys(userNotes).sort().forEach(function(dateStr) {
    var note = userNotes[dateStr];
    html += '<div style="font-size:13px;padding:8px;margin:4px 0;background:var(--surface-variant);border-radius:8px;border:1px solid var(--border)">';
    html += '<b>' + new Date(dateStr).toLocaleDateString('ru') + '</b>: ' + note.text;
    if (note.time) {
      html += ' <span style="color:var(--p)">(' + note.time + ')</span>';
    }
    html += '</div>';
    hasNotes = true;
  });

  if (!hasNotes) {
    html += '<span style="color:var(--text-secondary)">Нет сохранённых заметок</span>';
  }

  document.getElementById('notes-list').innerHTML = html;
}

// ========== PDF-ОТЧЁТ ПО ГОСТ Р 7.0.97-2016 ==========
function generateReport() {
  var name = document.getElementById('report-name').value || 'Не указано';
  var inn = document.getElementById('report-inn').value || 'Не указан';
  var regime = document.getElementById('report-regime').value;
  var income = parseFloat(document.getElementById('report-income').value) || 0;
  var expenses = parseFloat(document.getElementById('report-expenses').value) || 0;

  var regimeNames = {
    npd: 'НПД (Самозанятый)',
    ip6: 'ИП УСН 6% (Доходы)',
    ip15: 'ИП УСН 15% (Доходы - Расходы)',
    psn: 'ИП ПСН (Патент)',
    ooo6: 'ООО УСН 6% (Доходы)',
    ooo15: 'ООО УСН 15% (Доходы - Расходы)'
  };

  var tax = 0;
  if (regime === 'npd') tax = income * 0.04;
  else if (regime === 'ip6' || regime === 'ooo6') tax = income * 0.06;
  else if (regime === 'ip15' || regime === 'ooo15') tax = Math.max((income - expenses) * 0.15, income * 0.01);
  else if (regime === 'psn') tax = income * 0.06;

  var netIncome = income - tax;
  var effectiveRate = income > 0 ? (tax / income * 100).toFixed(1) : 0;

  var pdf = new jspdf.jsPDF();

  pdf.setFontSize(16);
  pdf.setFont('helvetica', 'bold');
  pdf.text('НАЛОГОВЫЙ ПРОФИЛЬ', 105, 20, {align: 'center'});

  pdf.setFontSize(10);
  pdf.setFont('helvetica', 'normal');
  pdf.text('Составлен в соответствии с ГОСТ Р 7.0.97-2016', 105, 28, {align: 'center'});

  pdf.setDrawColor(25, 135, 84);
  pdf.setLineWidth(0.5);
  pdf.line(20, 32, 190, 32);

  pdf.setFontSize(12);
  pdf.setFont('helvetica', 'bold');
  pdf.text('1. Реквизиты налогоплательщика', 20, 42);

  pdf.setFontSize(11);
  pdf.setFont('helvetica', 'normal');
  pdf.text('Наименование: ' + name, 20, 50);
  pdf.text('ИНН: ' + inn, 20, 58);
  pdf.text('Режим налогообложения: ' + (regimeNames[regime] || regime), 20, 66);

  pdf.setFontSize(12);
  pdf.setFont('helvetica', 'bold');
  pdf.text('2. Финансовые показатели за отчётный период', 20, 78);

  pdf.setFontSize(11);
  pdf.setFont('helvetica', 'normal');
  pdf.text('Годовой доход: ' + income.toLocaleString() + ' руб.', 20, 86);
  if (regime === 'ip15' || regime === 'ooo15') {
    pdf.text('Годовые расходы: ' + expenses.toLocaleString() + ' руб.', 20, 94);
  }
  pdf.text('Расчётная сумма налога: ' + Math.round(tax).toLocaleString() + ' руб.', 20, 102);
  pdf.text('Чистый доход (после налогообложения): ' + Math.round(netIncome).toLocaleString() + ' руб.', 20, 110);
  pdf.text('Эффективная налоговая ставка: ' + effectiveRate + '%', 20, 118);

  pdf.setDrawColor(200, 200, 200);
  pdf.line(20, 124, 190, 124);

  pdf.setFontSize(12);
  pdf.setFont('helvetica', 'bold');
  pdf.text('3. Дополнительная информация', 20, 134);

  pdf.setFontSize(10);
  pdf.setFont('helvetica', 'normal');
  pdf.text('Страховые взносы ИП (фикс.): 53 700 руб./год', 20, 142);
  pdf.text('Лимит выбранного режима: согласно НК РФ', 20, 150);

  pdf.setDrawColor(25, 135, 84);
  pdf.line(20, 160, 190, 160);

  pdf.setFontSize(9);
  pdf.text('Отчёт сгенерирован сервисом «Налоговый калькулятор» | Дата: ' + new Date().toLocaleDateString('ru'), 105, 170, {align: 'center'});
  pdf.text('Данный документ носит информационный характер и не является официальной отчётностью', 105, 176, {align: 'center'});

  pdf.setFontSize(10);
  pdf.text('___________________________ /' + name + '/', 20, 190);
  pdf.text('Подпись налогоплательщика', 20, 196);

  pdf.save('nalogovyj_profil.pdf');

  document.getElementById('report-result').innerHTML = '<div class="r-green">✅ Отчёт успешно сформирован и сохранён в формате PDF!</div>';
  showToast('PDF-отчёт сохранён!');

  challengeComplete('t7');
}

// ========== ЧЕК-ЛИСТ РЕГИСТРАЦИИ ИП/ООО ==========
var checklistItems = [
  {id:'cl1',text:'Выбрать систему налогообложения (НПД/УСН/ПСН/ОСНО)'},
  {id:'cl2',text:'Подготовить документы: паспорт, ИНН, заявление'},
  {id:'cl3',text:'Подать заявление в ФНС (онлайн через Госуслуги или лично)'},
  {id:'cl4',text:'Получить свидетельство о регистрации (ОГРНИП/ОГРН)'},
  {id:'cl5',text:'Открыть расчётный счёт в банке'},
  {id:'cl6',text:'Зарегистрировать онлайн-кассу (ККТ) если требуется по 54-ФЗ'},
  {id:'cl7',text:'Настроить приём платежей (эквайринг)'},
  {id:'cl8',text:'Заключить договоры с контрагентами'},
  {id:'cl9',text:'Настроить бухгалтерский учёт (самостоятельно или через аутсорсинг)'},
  {id:'cl10',text:'Проверить право на налоговые каникулы (для новых ИП)'}
];

var checklistState = JSON.parse(localStorage.getItem('checklistState') || '{}');

function buildChecklist() {
  var html = '';

  checklistItems.forEach(function(item) {
    var checked = checklistState[item.id] ? 'checked' : '';
    var completedClass = checklistState[item.id] ? ' completed' : '';

    html += '<div class="checklist-item' + completedClass + '">';
    html += '<input type="checkbox" ' + checked + ' onchange="toggleChecklist(\'' + item.id + '\')">';
    html += '<span>' + item.text + '</span>';
    html += '</div>';
  });

  document.getElementById('checklist-container').innerHTML = html;
  updateChecklistProgress();
}

function toggleChecklist(id) {
  checklistState[id] = !checklistState[id];
  localStorage.setItem('checklistState', JSON.stringify(checklistState));
  buildChecklist();

  var allDone = checklistItems.every(function(item) { return checklistState[item.id]; });
  if (allDone) {
    challengeComplete('t9');
  }
}

function updateChecklistProgress() {
  var completed = Object.values(checklistState).filter(function(v) { return v; }).length;
  var total = checklistItems.length;
  var percent = Math.round(completed / total * 100);
  document.getElementById('checklist-progress').textContent = percent + '% (' + completed + '/' + total + ')';
}

// ========== ЕЖЕДНЕВНЫЙ ЧЕЛЛЕНДЖ ==========
var challengeTasks = [
  {id:'t1',text:'Выполнить первый расчёт налога',xp:10,hint:'Перейдите в раздел «Расчёт налога» и нажмите «Рассчитать»'},
  {id:'t2',text:'Проверить лимиты на графике',xp:15,hint:'В разделе «Расчёт налога» постройте график прогноза'},
  {id:'t3',text:'Пройти анализ рисков (30 вопросов)',xp:20,hint:'Откройте «Анализ рисков» и ответьте на все вопросы'},
  {id:'t4',text:'Сравнить все режимы в калькуляторе',xp:15,hint:'В разделе «Сравнение режимов» запустите калькулятор'},
  {id:'t5',text:'Добавить заметку в календарь',xp:10,hint:'В «Базе знаний» найдите календарь и добавьте заметку'},
  {id:'t6',text:'Проверить право на налоговые каникулы',xp:20,hint:'В разделе «Льготы и каникулы» проверьте своё право'},
  {id:'t7',text:'Сгенерировать PDF-отчёт',xp:25,hint:'В разделе «PDF-отчёт» заполните данные и нажмите «Сформировать»'},
  {id:'t8',text:'Проверить контрагента через аудит',xp:15,hint:'В разделе «Аудит контрагента» введите ИНН и нажмите «Проверить»'},
  {id:'t9',text:'Пройти чек-лист регистрации до конца',xp:30,hint:'В разделе «Чек-лист ИП/ООО» отметьте все пункты'},
  {id:'t10',text:'Изучить все налоговые лайфхаки',xp:10,hint:'В «Базе знаний» прочитайте все карточки с лайфхаками'}
];

var challengeState = JSON.parse(localStorage.getItem('challengeState') || '{"xp":0,"completed":[]}');

function buildChallenge() {
  var html = '';

  challengeTasks.forEach(function(task) {
    var done = challengeState.completed.indexOf(task.id) >= 0;
    var style = done ? ' style="text-decoration:line-through;opacity:0.6"' : '';

    html += '<div class="chk-row"' + style + '>';
    html += '<input type="checkbox" ' + (done ? 'checked' : '') + ' onchange="toggleChallengeTask(\'' + task.id + '\',' + task.xp + ')">';
    html += '<div><span>' + task.text + ' (+' + task.xp + ' XP)</span>';
    if (!done) {
      html += '<br><small style="color:var(--text-secondary)">💡 ' + task.hint + '</small>';
    }
    html += '</div>';
    html += '</div>';
  });

  document.getElementById('challenge-tasks').innerHTML = html;
  updateChallengeDisplay();
}

function toggleChallengeTask(id, xp) {
  var idx = challengeState.completed.indexOf(id);
  if (idx >= 0) {
    challengeState.completed.splice(idx, 1);
    challengeState.xp -= xp;
  } else {
    challengeState.completed.push(id);
    challengeState.xp += xp;
  }

  if (challengeState.xp < 0) challengeState.xp = 0;
  localStorage.setItem('challengeState', JSON.stringify(challengeState));
  buildChallenge();
}

function updateChallengeDisplay() {
  var xp = challengeState.xp;
  var level = 'Новичок';
  var fillPercent = 0;

  if (xp >= 200) { level = 'Гуру'; fillPercent = 100; }
  else if (xp >= 150) { level = 'Эксперт'; fillPercent = 75; }
  else if (xp >= 100) { level = 'Профи'; fillPercent = 50; }
  else if (xp >= 50) { level = 'Продвинутый'; fillPercent = 25; }

  document.getElementById('challenge-level').textContent = level;
  document.getElementById('challenge-xp').textContent = xp;
  document.getElementById('xp-fill').style.width = fillPercent + '%';
}

function resetChallenge() {
  if (confirm('Сбросить весь прогресс челленджа?')) {
    challengeState = {xp: 0, completed: []};
    localStorage.setItem('challengeState', JSON.stringify(challengeState));
    buildChallenge();
  }
}

// ========== ТЕПЛОКАРТА НАЛОГОВОГО ГОДА ==========
function buildHeatmap() {
  var grid = document.getElementById('heatmap-grid');
  if (!grid) return;

  var html = '';
  var weekDays = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];

  weekDays.forEach(function(d) {
    html += '<div style="font-size:10px;text-align:center;color:var(--text-secondary)">' + d + '</div>';
  });

  for (var week = 0; week < 53; week++) {
    for (var day = 0; day < 7; day++) {
      var dayOfYear = week * 7 + day + 1;
      var level = 0;

      calendarEvents.forEach(function(event) {
        var eventDate = new Date(event.date);
        var startDate = new Date(2026, 0, 1);
        var eventDayOfYear = Math.floor((eventDate - startDate) / (1000 * 60 * 60 * 24)) + 1;

        if (eventDayOfYear === dayOfYear) {
          level = Math.max(level, event.regimes.length * 1.5);
        }
      });

      Object.keys(userNotes).forEach(function(noteDate) {
        var noteDateObj = new Date(noteDate);
        var startDate = new Date(2026, 0, 1);
        var noteDayOfYear = Math.floor((noteDateObj - startDate) / (1000 * 60 * 60 * 24)) + 1;

        if (noteDayOfYear === dayOfYear) {
          level = Math.max(level, 2);
        }
      });

      var lvlClass = 'lvl-' + Math.min(5, Math.floor(level));
      html += '<div class="heatmap-cell ' + lvlClass + '"></div>';
    }
  }

  grid.innerHTML = html;
}

// ========== ЗАПУСК ПРИЛОЖЕНИЯ ==========
document.addEventListener('DOMContentLoaded', function() {
  initAll();
});
</script>
